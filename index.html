<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVibe - AI Movie Curator</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- JSZip for Zip File Handling -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: white;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        .backface-hidden {
            backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        .preserve-3d {
            transform-style: preserve-3d;
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .slide-up {
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                film: <path d="M19.82 2H4.18C2.97 2 2 2.97 2 4.18v15.64C2 21.03 2.97 22 4.18 22h15.64c1.21 0 2.18-.97 2.18-2.18V4.18C22 2.97 21.03 2 19.82 2zM7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5" />,
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                swords: <path d="M14.5 17.5L3 6V3h3l11.5 11.5M13 19l6-6M16 16l4 4M19 21l2-2" />,
                ghost: <path d="M12 2a9 9 0 0 0-9 9v9a2 2 0 0 0 2 2l1.5-1.5L8 22l1.5-1.5L11 22l1.5-1.5L14 22l1.5-1.5L17 22l1.5-1.5L20 22a2 2 0 0 0 2-2v-9a9 9 0 0 0-9-9zm-3 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm6 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z" />,
                smile: <g><circle cx="12" cy="12" r="10" /><path d="M8 14s1.5 2 4 2 4-2 4-2" /><line x1="9" y1="9" x2="9.01" y2="9" /><line x1="15" y1="9" x2="15.01" y2="9" /></g>,
                heart: <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />,
                music: <path d="M9 18V5l12-2v13M9 9l12-2M9 18a3 3 0 1 1-3-3 3 3 0 0 1 3 3M21 18a3 3 0 1 1-3-3 3 3 0 0 1 3 3" />,
                chevronRight: <path d="M9 18l6-6-6-6" />,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.18-.08a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2h.18a2 2 0 0 1 1.73 1l.25.43a2 2 0 0 1 0 2l-.08.18a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.18.08a2 2 0 0 0 2-2v-.44a2 2 0 0 0-2-2h-.18a2 2 0 0 1-1.73-1l-.25-.43a2 2 0 0 1 0-2l.08-.18a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
                sparkles: <path d="M12 3l1.912 5.813a2 2 0 0 0 1.272 1.272L21 12l-5.813 1.912a2 2 0 0 0-1.272 1.272L12 21l-1.912-5.813a2 2 0 0 0-1.272-1.272L12 3z" />,
                rotateCcw: <path d="M3 2v6h6M3 13a9 9 0 1 0 3-7.7L3 8" />,
                star: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
                x: <path d="M18 6L6 18M6 6l12 12" />,
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />,
                check: <path d="M20 6L9 17l-5-5" />,
                list: <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />,
                brain: <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" />
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || icons.film}</svg>;
        };

        // --- Config ---
        // Added TMDB Genre IDs for mapping
        const GENRES = [
            { id: 'sci-fi', label: 'Sci-Fi', icon: 'zap', color: 'from-blue-500 to-cyan-500', tmdbId: 878 },
            { id: 'action', label: 'Action', icon: 'swords', color: 'from-orange-500 to-red-500', tmdbId: 28 },
            { id: 'horror', label: 'Horror', icon: 'ghost', color: 'from-purple-900 to-black', tmdbId: 27 },
            { id: 'romance', label: 'Romance', icon: 'heart', color: 'from-pink-500 to-rose-500', tmdbId: 10749 },
            { id: 'drama', label: 'Drama', icon: 'film', color: 'from-yellow-600 to-amber-700', tmdbId: 18 },
            { id: 'comedy', label: 'Comedy', icon: 'smile', color: 'from-yellow-400 to-orange-400', tmdbId: 35 },
        ];

        const ERAS = [
            { id: '1960s', label: '60s', min: 1960, max: 1969 },
            { id: '1970s', label: '70s', min: 1970, max: 1979 },
            { id: '1980s', label: '80s', min: 1980, max: 1989 },
            { id: '1990s', label: '90s', min: 1990, max: 1999 },
            { id: '2000s', label: '00s', min: 2000, max: 2009 },
            { id: '2010s', label: '10s', min: 2010, max: 2019 },
            { id: '2020s', label: '20s', min: 2020, max: 2029 },
        ];

        const VIBE_CHIPS = [
            "Mind-bending plot twists", "Slow burn atmosphere", "Cyberpunk dystopia",
            "Feel-good comfort", "Psychological thriller", "Hidden gems only"
        ];

        // --- Components ---

        const Card = ({ children, className = "", onClick, delay = 0 }) => (
            <div
                onClick={onClick}
                className={`cursor-pointer relative overflow-hidden rounded-2xl border border-white/10 bg-zinc-900/50 backdrop-blur-md shadow-xl hover:border-white/20 hover:shadow-2xl hover:shadow-purple-500/10 transition-all duration-300 transform hover:scale-[1.02] group slide-up ${className}`}
                style={{ animationDelay: `${delay}s` }}
            >
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const base = "px-6 py-3 rounded-xl font-medium transition-all duration-200 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed active:scale-95";
            const styles = {
                primary: "bg-white text-black hover:bg-zinc-200 shadow-[0_0_20px_rgba(255,255,255,0.3)]",
                outline: "border border-white/20 text-white hover:bg-white/10",
                ghost: "text-zinc-400 hover:text-white",
                brand: "bg-purple-600 text-white hover:bg-purple-500 shadow-purple-500/20"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${base} ${styles[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const SettingsModal = ({ isOpen, onClose, apiKeys, setApiKeys }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 fade-in">
                    <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 w-full max-w-md shadow-2xl transform transition-all scale-100">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold text-white">API Configuration</h2>
                            <button onClick={onClose}><Icon name="x" className="text-zinc-400 hover:text-white" /></button>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-medium text-zinc-400 mb-1 uppercase">OpenAI API Key</label>
                                <input type="password" value={apiKeys.openai} onChange={(e) => setApiKeys(prev => ({ ...prev, openai: e.target.value }))} placeholder="sk-..." className="w-full bg-black/50 border border-zinc-800 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500 transition-colors" />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-zinc-400 mb-1 uppercase">TMDB API Key</label>
                                <input type="password" value={apiKeys.tmdb} onChange={(e) => setApiKeys(prev => ({ ...prev, tmdb: e.target.value }))} placeholder="TMDB Key..." className="w-full bg-black/50 border border-zinc-800 rounded-lg p-3 text-white focus:outline-none focus:border-purple-500 transition-colors" />
                            </div>
                            <Button onClick={onClose} className="w-full justify-center mt-4">Save & Close</Button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---

        const App = () => {
            const [stage, setStage] = useState('landing');
            const [data, setData] = useState({ genre: null, era: null, vibe: '' });
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [loadingStep, setLoadingStep] = useState('');
            const [showSettings, setShowSettings] = useState(false);

            // Letterboxd Data - Expanded
            const [lbData, setLbData] = useState({
                favorites: [],
                watched: new Set(),
                watchlist: [], // Now array of objects {name, year}
                watchlistSet: new Set(), // For fast exclusion check
                likes: new Set(),
                loaded: false
            });

            const [apiKeys, setApiKeys] = useState(() => {
                const saved = localStorage.getItem('cinevibe_keys');
                return saved ? JSON.parse(saved) : { openai: '', tmdb: '' };
            });

            useEffect(() => {
                localStorage.setItem('cinevibe_keys', JSON.stringify(apiKeys));
            }, [apiKeys]);

            // File Handler
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const processText = (text, isRatings, isWatchlist = false) => {
                    const lines = text.split('\n');
                    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                    const nameIdx = headers.indexOf('name');
                    const ratingIdx = headers.indexOf('rating');
                    const yearIdx = headers.indexOf('year');

                    const localNames = new Set();
                    const localFaves = [];
                    const localWatchlistObjs = [];

                    if (nameIdx === -1) return { names: localNames, favorites: localFaves, watchlistObjs: localWatchlistObjs };

                    for (let i = 1; i < lines.length; i++) {
                        const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        if (row.length < 2) continue;
                        const name = row[nameIdx]?.replace(/^"|"$/g, '').trim();
                        if (!name) continue;

                        localNames.add(name.toLowerCase());

                        if (isRatings && ratingIdx !== -1) {
                            const rating = parseFloat(row[ratingIdx]);
                            if (rating >= 4) localFaves.push(name);
                        }

                        if (isWatchlist && yearIdx !== -1) {
                            const year = row[yearIdx]?.replace(/^"|"$/g, '').trim();
                            if (year) {
                                localWatchlistObjs.push({ name, year: parseInt(year) });
                            }
                        }
                    }
                    return { names: localNames, favorites: localFaves, watchlistObjs: localWatchlistObjs };
                };

                const combinedWatched = new Set();
                const combinedWatchlist = [];
                const combinedWatchlistSet = new Set();
                const combinedLikes = new Set();
                const combinedFavorites = [];

                try {
                    setLoadingStep("Reading files...");

                    if (file.name.endsWith('.zip')) {
                        const zip = new JSZip();
                        const zipped = await zip.loadAsync(file);

                        const watchedFile = zipped.file(/watched\.csv/i)[0];
                        if (watchedFile) {
                            const text = await watchedFile.async("string");
                            const { names } = processText(text, false);
                            names.forEach(m => combinedWatched.add(m));
                        }

                        const ratingsFile = zipped.file(/ratings\.csv/i)[0];
                        if (ratingsFile) {
                            const text = await ratingsFile.async("string");
                            const { names, favorites } = processText(text, true);
                            names.forEach(m => combinedWatched.add(m));
                            combinedFavorites.push(...favorites);
                        }

                        const watchlistFile = zipped.file(/watchlist\.csv/i)[0];
                        if (watchlistFile) {
                            const text = await watchlistFile.async("string");
                            const { names, watchlistObjs } = processText(text, false, true);
                            names.forEach(m => combinedWatchlistSet.add(m));
                            combinedWatchlist.push(...watchlistObjs);
                        }

                        const likesFile = zipped.file(/likes\.csv/i)[0];
                        if (likesFile) {
                            const text = await likesFile.async("string");
                            const { names } = processText(text, false);
                            names.forEach(m => combinedLikes.add(m));
                        }

                    } else {
                        // fallback csv
                        const text = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (e) => resolve(e.target.result);
                            reader.readAsText(file);
                        });
                        const isRatings = text.toLowerCase().includes('rating');
                        const { names, favorites } = processText(text, isRatings);
                        names.forEach(m => combinedWatched.add(m));
                        combinedFavorites.push(...favorites);
                    }

                    if (combinedWatched.size > 0 || combinedWatchlistSet.size > 0) {
                        setLbData({
                            favorites: combinedFavorites.slice(0, 50),
                            watched: combinedWatched,
                            watchlist: combinedWatchlist,
                            watchlistSet: combinedWatchlistSet,
                            likes: combinedLikes,
                            loaded: true
                        });
                    } else {
                        alert("No valid movie data found. Please check your zip file.");
                    }

                } catch (err) {
                    alert("Error parsing file: " + err.message);
                }
            };

            const resetApp = () => {
                setData({ genre: null, era: null, vibe: '' });
                setResults([]);
                setStage('genre');
            };

            const filterWatchlist = async () => {
                if (!apiKeys.tmdb) { setShowSettings(true); return; }
                setLoading(true);
                setLoadingStep("Filtering your watchlist...");

                try {
                    // 1. Filter by Decade (Client-side)
                    const decadeMatches = lbData.watchlist.filter(m =>
                        m.year >= data.era.min && m.year <= data.era.max
                    );

                    if (decadeMatches.length === 0) {
                        throw new Error(`No movies in your watchlist from the ${data.era.label}.`);
                    }

                    // 2. Fetch TMDB details to check Genre
                    // Limit to 20 to avoid rate limits/slow load
                    setLoadingStep(`Checking genres for ${Math.min(decadeMatches.length, 20)} candidates...`);

                    const candidates = decadeMatches.slice(0, 20);
                    const matchedMovies = [];

                    for (const movie of candidates) {
                        try {
                            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKeys.tmdb}&query=${encodeURIComponent(movie.name)}&year=${movie.year}&include_adult=false`);
                            const searchData = await res.json();
                            const details = searchData.results?.[0];

                            if (details && details.genre_ids.includes(data.genre.tmdbId)) {
                                matchedMovies.push({
                                    title: details.title,
                                    year: details.release_date?.split('-')[0] || movie.year,
                                    poster: details.poster_path ? `https://image.tmdb.org/t/p/w500${details.poster_path}` : null,
                                    backdrop: details.backdrop_path ? `https://image.tmdb.org/t/p/w1280${details.backdrop_path}` : null,
                                    overview: details.overview,
                                    rating: details.vote_average,
                                    reason: "Found in your Watchlist" // Label for card back
                                });
                            }
                        } catch (e) { console.error(e); }
                    }

                    if (matchedMovies.length === 0) {
                        throw new Error(`Found ${decadeMatches.length} movies from the ${data.era.label} in your watchlist, but none matched the ${data.genre.label} genre.`);
                    }

                    setResults(matchedMovies);
                    setStage('results');

                } catch (err) {
                    alert(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const generateRecommendations = async () => {
                if (!apiKeys.openai || !apiKeys.tmdb) {
                    setShowSettings(true);
                    return;
                }

                setLoading(true);
                try {
                    setLoadingStep('Analyzing taste profile...');

                    let userContext = "";
                    if (lbData.loaded) {
                        if (lbData.favorites.length > 0) {
                            userContext += `\nUSER'S FAVORITES (Use these to understand their taste, but DO NOT recommend them): ${lbData.favorites.join(", ")}.`;
                        }
                        userContext += `\nIMPORTANT: The user has seen ${lbData.watched.size} movies. I will filter the output, so please generate 8 recommendations so I have backups if some are watched.`;
                    }

                    const systemPrompt = `
                        You are a master film curator. 
                        The user wants movie recommendations based on:
                        Genre: ${data.genre.label}
                        Era: ${data.era.label} (${data.era.id})
                        Vibe/Context: "${data.vibe}"
                        ${userContext}
                        
                        Constraints:
                        1. Return strictly a JSON array of 8 objects (titles).
                        2. Each object must have: "title", "year" (string), and "reason" (a short, punchy sentence explaining why it fits the vibe/taste).
                        3. Focus on "hidden gems" or matches for the Favorites list if provided.
                        4. Do NOT number the list. Just raw JSON.
                    `;

                    setLoadingStep('Consulting the Oracle...');
                    const gptResponse = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKeys.openai}` },
                        body: JSON.stringify({
                            model: "gpt-4o-mini",
                            messages: [{ role: "system", content: "You are a helpful movie recommendation API that outputs only JSON." }, { role: "user", content: systemPrompt }],
                            temperature: 0.7
                        })
                    });

                    const gptData = await gptResponse.json();
                    let content = gptData.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
                    const rawRecommendations = JSON.parse(content);

                    setLoadingStep('Filtering watched movies...');

                    const filteredRecs = rawRecommendations.filter(movie => {
                        const isWatched = lbData.watched.has(movie.title.toLowerCase());
                        return !isWatched;
                    }).slice(0, 4);

                    if (filteredRecs.length === 0) {
                        throw new Error("You've seen everything good! Try a different vibe.");
                    }

                    setLoadingStep('Fetching visuals...');

                    const hydratedResults = await Promise.all(filteredRecs.map(async (movie) => {
                        try {
                            const searchRes = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKeys.tmdb}&query=${encodeURIComponent(movie.title)}&year=${movie.year}&include_adult=false`);
                            const searchData = await searchRes.json();
                            const tmdbDetails = searchData.results?.[0];
                            return {
                                ...movie,
                                poster: tmdbDetails?.poster_path ? `https://image.tmdb.org/t/p/w500${tmdbDetails.poster_path}` : null,
                                overview: tmdbDetails?.overview || "No overview available.",
                                rating: tmdbDetails?.vote_average || "N/A",
                                backdrop: tmdbDetails?.backdrop_path ? `https://image.tmdb.org/t/p/w1280${tmdbDetails.backdrop_path}` : null
                            };
                        } catch (e) { return movie; }
                    }));

                    setResults(hydratedResults);
                    setStage('results');

                } catch (error) {
                    alert("Error: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            // Renderers
            const renderLanding = () => (
                <div className="flex flex-col items-center justify-center h-screen text-center px-4 fade-in">
                    <div className="mb-8 relative">
                        <div className="absolute inset-0 bg-purple-500/20 blur-3xl rounded-full"></div>
                        <Icon name="film" size={64} className="text-white relative z-10 animate-[spin_20s_linear_infinite]" />
                    </div>
                    <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-white/50 tracking-tighter mb-6">CineVibe</h1>
                    <p className="text-zinc-400 text-lg md:text-xl max-w-md mb-10">AI-powered film curation.<br />Stop scrolling. Start watching.</p>

                    <div className="flex flex-col gap-4 w-full max-w-xs">
                        <Button onClick={() => setStage('genre')} className="justify-center">Start Fresh <Icon name="chevronRight" size={18} /></Button>
                        <Button variant="outline" onClick={() => setStage('sync')} className="justify-center border-purple-500/50 text-purple-200 hover:bg-purple-500/10">
                            {lbData.loaded ? "Letterboxd Synced" : "Connect Letterboxd"} <Icon name={lbData.loaded ? "check" : "upload"} size={16} />
                        </Button>
                    </div>

                    <button onClick={() => setShowSettings(true)} className="mt-8 text-zinc-600 hover:text-white text-sm flex items-center gap-2 transition-colors"><Icon name="settings" size={14} /> Configure API Keys</button>
                </div>
            );

            const renderSync = () => (
                <div className="max-w-xl mx-auto w-full min-h-screen flex flex-col justify-center px-4 fade-in">
                    <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 text-center">
                        <div className="w-16 h-16 bg-purple-900/30 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-400">
                            <Icon name="upload" size={32} />
                        </div>
                        <h2 className="text-2xl font-bold text-white mb-2">Sync Letterboxd</h2>
                        <p className="text-zinc-400 mb-8 text-sm leading-relaxed">
                            Upload your <code>letterboxd-export.zip</code> (get it <a href="https://letterboxd.com/data/export/" target="_blank" rel="noopener noreferrer" className="text-purple-400 hover:text-purple-300 underline">here</a>).<br />
                            We'll analyze your history to personalize recommendations.
                        </p>

                        {!lbData.loaded ? (
                            <div className="border-2 border-dashed border-zinc-700 hover:border-purple-500 rounded-xl p-10 transition-colors cursor-pointer relative bg-zinc-950/50 group">
                                <input type="file" accept=".zip,.csv" onChange={handleFileUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                <div className="pointer-events-none">
                                    <p className="text-white font-medium group-hover:text-purple-400 transition-colors">Click to Upload ZIP</p>
                                    <p className="text-zinc-600 text-xs mt-2">Data stays in your browser.</p>
                                </div>
                            </div>
                        ) : (
                            <div className="w-full mb-6">
                                <div className="bg-green-500/10 border border-green-500/20 rounded-xl p-4 mb-4 flex items-center justify-center gap-2 text-green-400 font-bold">
                                    <Icon name="check" /> Synced Successfully
                                </div>
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="bg-zinc-800/50 border border-zinc-700/50 p-4 rounded-xl flex flex-col items-center">
                                        <span className="text-3xl font-bold text-white tracking-tight">{lbData.watched.size}</span>
                                        <span className="text-[10px] text-zinc-500 uppercase tracking-widest font-semibold mt-1">Watched</span>
                                    </div>
                                    <div className="bg-zinc-800/50 border border-zinc-700/50 p-4 rounded-xl flex flex-col items-center">
                                        <span className="text-3xl font-bold text-white tracking-tight">{lbData.watchlist.length}</span>
                                        <span className="text-[10px] text-zinc-500 uppercase tracking-widest font-semibold mt-1">Watchlist</span>
                                    </div>
                                    <div className="bg-zinc-800/50 border border-zinc-700/50 p-4 rounded-xl flex flex-col items-center">
                                        <span className="text-3xl font-bold text-white tracking-tight">{lbData.likes.size > 0 ? lbData.likes.size : lbData.favorites.length}</span>
                                        <span className="text-[10px] text-zinc-500 uppercase tracking-widest font-semibold mt-1">{lbData.likes.size > 0 ? 'Liked' : 'Rated 4+'}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="mt-8 flex justify-between">
                            <Button variant="ghost" onClick={() => setStage('landing')}>Back</Button>
                            <Button onClick={() => setStage('genre')} disabled={!lbData.loaded && false}>
                                {lbData.loaded ? "Continue" : "Skip"} <Icon name="chevronRight" size={16} />
                            </Button>
                        </div>
                    </div>
                </div>
            );

            const renderGenre = () => (
                <div className="max-w-5xl mx-auto w-full min-h-screen flex flex-col justify-center px-4 py-10 fade-in">
                    <div className="mb-8 flex justify-between items-end">
                        <div>
                            <h2 className="text-3xl font-bold text-white mb-2">Pick a Genre</h2>
                            <p className="text-zinc-400">What's the baseline flavor?</p>
                        </div>
                        {lbData.loaded && <span className="text-xs text-purple-400 bg-purple-400/10 px-3 py-1 rounded-full border border-purple-400/20">Using Letterboxd Data</span>}
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                        {GENRES.map((genre, i) => (
                            <Card key={genre.id} delay={i * 0.1} onClick={() => { setData({ ...data, genre }); setStage('era'); }} className="h-40 flex flex-col justify-between p-6 group hover:bg-zinc-800">
                                <div className={`absolute inset-0 opacity-0 group-hover:opacity-20 transition-opacity duration-500 bg-gradient-to-br ${genre.color}`}></div>
                                <div className="relative z-10 flex justify-between items-start">
                                    <Icon name={genre.icon} className="text-white/80 group-hover:text-white group-hover:scale-110 transition-all duration-300" size={32} />
                                    <Icon name="chevronRight" className="text-zinc-600 group-hover:text-white -translate-x-2 opacity-0 group-hover:opacity-100 group-hover:translate-x-0 transition-all" />
                                </div>
                                <div className="relative z-10">
                                    <h3 className="text-xl font-bold text-white">{genre.label}</h3>
                                </div>
                            </Card>
                        ))}
                    </div>
                    <div className="mt-8 flex justify-center"><Button variant="ghost" onClick={() => setStage('landing')}>Back</Button></div>
                </div>
            );

            const renderEra = () => (
                <div className="max-w-4xl mx-auto w-full min-h-screen flex flex-col justify-center px-4 fade-in py-10">
                    <div className="mb-8 text-center">
                        <h2 className="text-3xl font-bold text-white mb-2">Select a Decade</h2>
                    </div>

                    <div className="flex flex-col items-center gap-3 overflow-y-auto max-h-[60vh] w-full px-2 no-scrollbar pb-20">
                        {ERAS.map((era, i) => (
                            <div key={era.id} className="w-full max-w-md shrink-0 slide-up" style={{ animationDelay: `${i * 0.05}s` }}>
                                <button
                                    onClick={() => { setData({ ...data, era }); setStage('mode'); }}
                                    className="w-full h-24 bg-zinc-900/50 backdrop-blur-sm border border-zinc-800 rounded-2xl flex items-center justify-between px-8 relative overflow-hidden hover:border-white/50 hover:bg-zinc-800 transition-all duration-300 group shadow-lg"
                                >
                                    <div className="flex items-center gap-6">
                                        <span className="text-5xl font-black text-zinc-800 group-hover:text-white/20 transition-colors">{era.label}</span>
                                        <div className="h-12 w-0.5 bg-zinc-800 group-hover:bg-zinc-600 transition-colors"></div>
                                        <span className="text-zinc-500 font-medium group-hover:text-white transition-colors">The {era.id}</span>
                                    </div>
                                    <Icon name="chevronRight" className="text-zinc-700 group-hover:text-white transition-colors transform group-hover:translate-x-1" />
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none">
                        <div className="pointer-events-auto">
                            <Button variant="ghost" onClick={() => setStage('genre')} className="bg-black/50 backdrop-blur-md border border-zinc-800">Back</Button>
                        </div>
                    </div>
                </div>
            );

            // NEW: Mode Selection Screen
            const renderMode = () => (
                <div className="max-w-3xl mx-auto w-full min-h-screen flex flex-col justify-center px-4 fade-in">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-white mb-2">Choose Your Path</h2>
                        <p className="text-zinc-400">How do you want to find your next movie?</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Option 1: AI Chatbot */}
                        <div
                            onClick={() => setStage('vibe')}
                            className="bg-zinc-900/50 border border-zinc-800 hover:border-purple-500 hover:bg-zinc-900 rounded-2xl p-8 cursor-pointer transition-all group relative overflow-hidden"
                        >
                            <div className="absolute inset-0 bg-purple-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div className="w-16 h-16 bg-purple-500/10 rounded-full flex items-center justify-center mb-6 text-purple-400 group-hover:scale-110 transition-transform">
                                <Icon name="brain" size={32} />
                            </div>
                            <h3 className="text-2xl font-bold text-white mb-2">Consult the AI</h3>
                            <p className="text-zinc-400 text-sm leading-relaxed">
                                Tell the chatbot exactly what you're feeling. It will find hidden gems and new discoveries based on your prompt.
                            </p>
                        </div>

                        {/* Option 2: Watchlist Filter */}
                        <div
                            onClick={lbData.loaded ? filterWatchlist : null}
                            className={`bg-zinc-900/50 border border-zinc-800 rounded-2xl p-8 transition-all relative overflow-hidden ${lbData.loaded ? 'cursor-pointer hover:border-green-500 hover:bg-zinc-900 group' : 'opacity-50 cursor-not-allowed'}`}
                        >
                            {lbData.loaded && <div className="absolute inset-0 bg-green-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>}
                            <div className="w-16 h-16 bg-green-500/10 rounded-full flex items-center justify-center mb-6 text-green-400 group-hover:scale-110 transition-transform">
                                <Icon name="list" size={32} />
                            </div>
                            <h3 className="text-2xl font-bold text-white mb-2">Filter Watchlist</h3>
                            <p className="text-zinc-400 text-sm leading-relaxed mb-4">
                                Browse movies from your own Watchlist that match the <strong>{data.genre?.label}</strong> genre and <strong>{data.era?.label}</strong>.
                            </p>
                            {!lbData.loaded && (
                                <div className="inline-block bg-zinc-800 text-zinc-400 text-xs px-3 py-1 rounded-full">
                                    Requires Letterboxd Sync
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="mt-12 flex justify-center">
                        <Button variant="ghost" onClick={() => setStage('era')}>Back</Button>
                    </div>
                </div>
            );

            const renderVibe = () => (
                <div className="max-w-2xl mx-auto w-full min-h-screen flex flex-col justify-center px-4 fade-in">
                    <div className="bg-zinc-900/80 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
                        <div className="flex items-center gap-3 mb-6 text-sm text-zinc-400 uppercase tracking-widest font-bold">
                            <Icon name="sparkles" size={14} className="text-purple-500" /><span>The Assistant</span>
                        </div>
                        <h2 className="text-2xl md:text-3xl font-bold text-white mb-6">Tell me specifically what you want.</h2>
                        <textarea value={data.vibe} onChange={(e) => setData({ ...data, vibe: e.target.value })} placeholder="e.g. Like Blade Runner but grittier..." className="w-full bg-black/50 border border-zinc-700 rounded-xl p-4 text-white text-lg focus:border-purple-500 focus:outline-none transition-all h-32 mb-6" autoFocus />
                        <div className="mb-8">
                            <div className="flex flex-wrap gap-2">
                                {VIBE_CHIPS.map(chip => (
                                    <button key={chip} onClick={() => setData({ ...data, vibe: chip })} className="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-xs rounded-full border border-zinc-700 transition-all">{chip}</button>
                                ))}
                            </div>
                        </div>
                        <div className="flex justify-between">
                            <Button variant="ghost" onClick={() => setStage('mode')}>Back</Button>
                            <Button onClick={generateRecommendations} disabled={!data.vibe.trim()}>Generate <Icon name="sparkles" size={16} /></Button>
                        </div>
                    </div>
                </div>
            );

            const renderResults = () => {
                const bgImage = results[0]?.backdrop || results[0]?.poster;
                return (
                    <div className="w-full min-h-screen relative py-20 px-4 fade-in">
                        <div className="fixed inset-0 z-0">
                            <div className="absolute inset-0 bg-zinc-950/90 z-10"></div>
                            {bgImage && <img src={bgImage} className="w-full h-full object-cover blur-xl opacity-20" />}
                        </div>
                        <div className="relative z-10 max-w-6xl mx-auto">
                            <div className="flex justify-between items-end mb-10 border-b border-white/10 pb-6">
                                <div>
                                    <h2 className="text-3xl font-bold text-white">Curated Selection</h2>
                                    <p className="text-zinc-400 mt-1">{data.genre?.label} • {data.era?.label} {lbData.loaded && "• Personalized"}</p>
                                </div>
                                <Button variant="outline" onClick={resetApp}><Icon name="rotateCcw" size={16} /> Start Over</Button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {results.map((movie, idx) => (
                                    <div key={idx} className="group relative h-[450px] perspective-1000 slide-up" style={{ animationDelay: `${idx * 0.15}s` }}>
                                        <div className="relative w-full h-full transition-all duration-500 preserve-3d group-hover:rotate-y-180">
                                            {/* Front */}
                                            <div className="absolute inset-0 w-full h-full backface-hidden bg-zinc-900 rounded-xl overflow-hidden border border-white/5">
                                                {movie.poster ? <img src={movie.poster} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center"><Icon name="film" size={48} className="opacity-50" /></div>}
                                                <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black via-black/80 to-transparent p-4 pt-20">
                                                    <h3 className="text-white font-bold text-lg">{movie.title}</h3>
                                                    <span className="text-zinc-400 text-xs bg-zinc-800 px-2 py-0.5 rounded mt-1 inline-block">{movie.year}</span>
                                                </div>
                                            </div>
                                            {/* Back */}
                                            <div className="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-zinc-900 rounded-xl p-6 border border-purple-500/30 flex flex-col justify-center shadow-[0_0_30px_rgba(168,85,247,0.15)]">
                                                <div className="mb-4"><div className="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center mb-3"><Icon name="sparkles" size={20} className="text-purple-400" /></div><h4 className="text-sm text-purple-300 font-bold uppercase">Why it fits</h4></div>
                                                <p className="text-white text-lg font-medium italic">"{movie.reason}"</p>
                                                <div className="mt-6 pt-6 border-t border-white/10"><p className="text-zinc-400 text-xs line-clamp-4">{movie.overview}</p></div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="flex flex-col items-center justify-center h-screen fade-in"><div className="w-16 h-16 border-4 border-zinc-800 border-t-purple-500 rounded-full animate-spin mb-6"></div><h3 className="text-xl font-bold text-white animate-pulse">{loadingStep}</h3></div>;

            return (
                <>
                    {stage === 'landing' && renderLanding()}
                    {stage === 'sync' && renderSync()}
                    {stage === 'genre' && renderGenre()}
                    {stage === 'era' && renderEra()}
                    {stage === 'mode' && renderMode()}
                    {stage === 'vibe' && renderVibe()}
                    {stage === 'results' && renderResults()}
                    <SettingsModal isOpen={showSettings} onClose={() => setShowSettings(false)} apiKeys={apiKeys} setApiKeys={setApiKeys} />
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
